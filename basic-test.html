<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>基础测试</title>
</head>
<body style="background: #1e1e3f; color: white; font-family: Arial;">
    <h1>基础测试页面</h1>
    <p>如果你能看到这个页面，说明HTML正常加载。</p>

    <h2>测试1: 直接在HTML中使用onclick</h2>
    <button onclick="alert('测试1成功')">测试1</button>

    <h2>测试2: 使用函数</h2>
    <button id="btn2">测试2</button>

    <h2>测试3: 添加事件监听器</h2>
    <button id="btn3">测试3</button>

    <div id="output" style="margin-top: 20px; padding: 10px; background: #333;"></div>

    <script>
        // 在页面底部显示脚本是否加载
        document.getElementById('output').innerHTML = '✅ JavaScript 脚本已加载<br>';

        // 测试2: 使用函数
        function test2() {
            alert('测试2成功');
            document.getElementById('output').innerHTML += '✅ 测试2成功<br>';
        }
        document.getElementById('btn2').onclick = test2;

        // 测试3: 事件监听器
        document.getElementById('btn3').addEventListener('click', function() {
            alert('测试3成功');
            document.getElementById('output').innerHTML += '✅ 测试3成功<br>';
        });

        // 显示浏览器信息
        document.getElementById('output').innerHTML += '浏览器: ' + navigator.userAgent + '<br>';
    </script>
</body>
</html>
