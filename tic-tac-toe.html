<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>XO大作战 - 井字棋游戏</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Arial', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            max-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
            overflow: hidden;
        }

        .game-wrapper {
            display: flex;
            gap: 30px;
            align-items: flex-start;
            max-width: 900px;
            width: 100%;
        }

        .game-container {
            background: white;
            border-radius: 20px;
            padding: 30px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            text-align: center;
            flex: 0 0 auto;
        }

        .side-panel {
            background: white;
            border-radius: 20px;
            padding: 25px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            flex: 1;
            min-width: 280px;
            max-width: 320px;
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        h1 {
            color: #333;
            margin-bottom: 10px;
            font-size: 2em;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.1);
        }

        .status {
            font-size: 1.1em;
            color: #555;
            margin-bottom: 20px;
            padding: 12px;
            background: #f0f0f0;
            border-radius: 10px;
            font-weight: bold;
        }

        .board {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 8px;
            margin: 0 auto 20px;
            max-width: 270px;
        }

        .cell {
            width: 80px;
            height: 80px;
            background: #f8f9fa;
            border: 3px solid #dee2e6;
            border-radius: 10px;
            font-size: 2.5em;
            font-weight: bold;
            cursor: pointer;
            display: flex;
            justify-content: center;
            align-items: center;
            transition: all 0.3s ease;
            user-select: none;
        }

        .cell:hover:not(.taken) {
            background: #e9ecef;
            transform: scale(1.05);
            border-color: #667eea;
        }

        .cell.taken {
            cursor: not-allowed;
        }

        .cell.x {
            color: #667eea;
        }

        .cell.o {
            color: #764ba2;
        }

        .cell.winner {
            background: #ffd700;
            animation: winner-pulse 0.5s ease-in-out infinite alternate;
        }

        @keyframes winner-pulse {
            from {
                transform: scale(1);
                box-shadow: 0 0 10px rgba(255, 215, 0, 0.5);
            }
            to {
                transform: scale(1.1);
                box-shadow: 0 0 20px rgba(255, 215, 0, 0.8);
            }
        }

        .buttons {
            display: flex;
            gap: 10px;
            justify-content: center;
            flex-wrap: wrap;
        }

        button {
            padding: 10px 20px;
            font-size: 0.95em;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            transition: all 0.3s ease;
            font-weight: bold;
        }

        .restart-btn {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }

        .restart-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.4);
        }

        .scores {
            padding: 15px;
            background: #f8f9fa;
            border-radius: 10px;
        }

        .score-board {
            display: flex;
            justify-content: space-around;
            align-items: center;
        }

        .score {
            font-size: 1em;
            font-weight: bold;
        }

        .score.x {
            color: #667eea;
        }

        .score.o {
            color: #764ba2;
        }

        .score-number {
            font-size: 1.8em;
            margin-top: 5px;
        }

        .mode-selector {
            margin-bottom: 15px;
            display: flex;
            gap: 8px;
            justify-content: center;
        }

        .mode-btn {
            padding: 8px 15px;
            background: #e9ecef;
            border: 2px solid #dee2e6;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.3s ease;
            font-weight: bold;
            font-size: 0.9em;
        }

        .mode-btn.active {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border-color: #667eea;
        }

        .mode-btn:hover {
            transform: translateY(-2px);
        }

        .difficulty-selector {
            margin-bottom: 15px;
            display: none;
        }

        .difficulty-selector.show {
            display: block;
        }

        .difficulty-selector label {
            font-weight: bold;
            margin-right: 10px;
            font-size: 0.9em;
        }

        .difficulty-selector select {
            padding: 6px 12px;
            border-radius: 8px;
            border: 2px solid #dee2e6;
            font-size: 0.9em;
            cursor: pointer;
        }

        .skills-section {
            padding: 15px;
            background: #f8f9fa;
            border-radius: 10px;
        }

        .skills-title {
            font-size: 1.1em;
            font-weight: bold;
            margin-bottom: 10px;
            color: #333;
        }

        .points-display {
            font-size: 1.2em;
            margin-bottom: 12px;
            color: #667eea;
            font-weight: bold;
        }

        .skills-container {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .skill-btn {
            padding: 10px 15px;
            background: white;
            border: 2px solid #dee2e6;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.3s ease;
            font-size: 0.9em;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .skill-btn:hover:not(:disabled):not(.active) {
            background: #e9ecef;
            transform: translateY(-2px);
        }

        .skill-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .skill-btn:not(:disabled):not(.active) {
            box-shadow: 0 2px 8px rgba(102, 126, 234, 0.3);
            border-color: #667eea;
        }

        .skill-btn.active {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border-color: #667eea;
        }

        .skill-btn.confirming {
            background: linear-gradient(135deg, #ffd700 0%, #ff6b6b 100%);
            border-color: #ff6b6b;
            color: white;
        }

        .skill-btn.confirming .skill-cost {
            color: white;
        }

        .cancel-btn {
            background: #ff6b6b;
            color: white;
            margin-top: 10px;
            display: none;
        }

        .cancel-btn.show {
            display: block;
        }

        .cancel-btn:hover {
            background: #ff5252;
        }

        .skill-name {
            font-weight: bold;
        }

        .skill-cost {
            font-size: 0.85em;
            color: #666;
        }

        .skill-btn:not(:disabled) .skill-cost {
            color: #667eea;
        }

        .skill-btn.active .skill-cost {
            color: white;
        }

        .cell.blocked {
            background: #ff6b6b;
            border-color: #ff5252;
        }

        .cell.removing {
            animation: shake 0.3s ease-in-out;
        }

        .cell.selected {
            background: #ffd700;
            border-color: #ff6b6b;
            transform: scale(1.05);
            box-shadow: 0 0 15px rgba(255, 215, 0, 0.6);
        }

        .game-container.selecting-mode .cell.taken:not(.selected) {
            cursor: not-allowed;
            opacity: 0.6;
        }

        .game-container.selecting-mode .cell:not(.taken):not(.blocked) {
            cursor: not-allowed;
            opacity: 0.6;
        }

        .confirm-dialog {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.5);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }

        .confirm-dialog.show {
            display: flex;
        }

        .confirm-box {
            background: white;
            padding: 30px;
            border-radius: 20px;
            text-align: center;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.5);
            max-width: 400px;
        }

        .confirm-title {
            font-size: 1.3em;
            font-weight: bold;
            margin-bottom: 20px;
            color: #333;
        }

        .confirm-buttons {
            display: flex;
            gap: 15px;
            justify-content: center;
            margin-top: 20px;
        }

        .confirm-btn {
            padding: 12px 25px;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            font-weight: bold;
            font-size: 1em;
            transition: all 0.3s ease;
        }

        .confirm-btn.yes {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }

        .confirm-btn.yes:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.4);
        }

        .confirm-btn.no {
            background: #ff6b6b;
            color: white;
        }

        .confirm-btn.no:hover {
            background: #ff5252;
            transform: translateY(-2px);
        }

        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-5px); }
            75% { transform: translateX(5px); }
        }
    </style>
</head>
<body>
    <div class="game-wrapper">
        <div class="game-container" id="game-container">
            <h1>XO大作战</h1>
            <div class="mode-selector">
                <button class="mode-btn active" onclick="setGameMode('pvp')">双人对战</button>
                <button class="mode-btn" onclick="setGameMode('pve')">人机对战</button>
            </div>
            <div class="difficulty-selector" id="difficulty-selector">
                <label>难度：</label>
                <select id="difficulty" onchange="setDifficulty(this.value)">
                    <option value="easy">简单</option>
                    <option value="medium">中等</option>
                    <option value="hard" selected>困难</option>
                </select>
            </div>
            <div class="status" id="status">轮到 X 下棋</div>
            <div class="board" id="board">
                <div class="cell" data-index="0"></div>
                <div class="cell" data-index="1"></div>
                <div class="cell" data-index="2"></div>
                <div class="cell" data-index="3"></div>
                <div class="cell" data-index="4"></div>
                <div class="cell" data-index="5"></div>
                <div class="cell" data-index="6"></div>
                <div class="cell" data-index="7"></div>
                <div class="cell" data-index="8"></div>
            </div>
            <div class="buttons">
                <button class="restart-btn" onclick="restartGame()">重新开始</button>
            </div>
        </div>
        <div class="side-panel">
            <div class="skills-section">
                <div class="skills-title">⚡ 技能商城</div>
                <div class="points-display">你的积分: <span id="points">0</span></div>
                <div class="skills-container">
                    <button class="skill-btn" id="skill-block" onclick="useSkill('block')">
                        <span class="skill-name">🔒 封印格子</span>
                        <span class="skill-cost">2 积分</span>
                    </button>
                    <button class="skill-btn" id="skill-instant" onclick="useSkill('instant')">
                        <span class="skill-name">🏆 直接胜利</span>
                        <span class="skill-cost">10 积分</span>
                    </button>
                    <button class="skill-btn" id="skill-remove" onclick="useSkill('remove')">
                        <span class="skill-name">💥 消除棋子</span>
                        <span class="skill-cost">2 积分</span>
                    </button>
                </div>
                <button class="cancel-btn" id="cancel-btn" onclick="cancelSkill()">取消技能</button>
            </div>
            <div class="scores">
                <div class="score-board">
                    <div class="score x">
                        <div>X 获胜</div>
                        <div class="score-number" id="x-score">0</div>
                    </div>
                    <div class="score">
                        <div>平局</div>
                        <div class="score-number" id="draw-score">0</div>
                    </div>
                    <div class="score o">
                        <div>O 获胜</div>
                        <div class="score-number" id="o-score">0</div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <div class="confirm-dialog" id="confirm-dialog">
        <div class="confirm-box">
            <div class="confirm-title" id="confirm-title">确认操作</div>
            <div class="confirm-buttons">
                <button class="confirm-btn yes" onclick="confirmRemoval()">确认</button>
                <button class="confirm-btn no" onclick="cancelRemoval()">取消</button>
            </div>
        </div>
    </div>

    <script>
        let currentPlayer = 'X';
        let board = ['', '', '', '', '', '', '', '', ''];
        let gameActive = true;
        let scores = { X: 0, O: 0, draw: 0 };
        let gameMode = 'pvp';
        let difficulty = 'hard';
        let isComputerTurn = false;
        let points = 0;
        let activeSkill = null;
        let selectedSkill = null;
        let blockedCells = [];
        let selectedCellIndex = null;

        const winningCombinations = [
            [0, 1, 2], [3, 4, 5], [6, 7, 8], // 横向
            [0, 3, 6], [1, 4, 7], [2, 5, 8], // 纵向
            [0, 4, 8], [2, 4, 6]              // 对角线
        ];

        const cells = document.querySelectorAll('.cell');
        const statusDisplay = document.getElementById('status');
        const xScoreDisplay = document.getElementById('x-score');
        const oScoreDisplay = document.getElementById('o-score');
        const drawScoreDisplay = document.getElementById('draw-score');
        const difficultySelector = document.getElementById('difficulty-selector');
        const pointsDisplay = document.getElementById('points');
        const cancelBtn = document.getElementById('cancel-btn');
        const confirmDialog = document.getElementById('confirm-dialog');
        const confirmTitle = document.getElementById('confirm-title');
        const gameContainer = document.getElementById('game-container');
        const skillBtns = {
            block: document.getElementById('skill-block'),
            instant: document.getElementById('skill-instant'),
            remove: document.getElementById('skill-remove')
        };

        cells.forEach(cell => {
            cell.addEventListener('click', handleCellClick);
        });

        function setGameMode(mode) {
            gameMode = mode;
            const buttons = document.querySelectorAll('.mode-btn');
            buttons.forEach(btn => btn.classList.remove('active'));

            if (mode === 'pvp') {
                buttons[0].classList.add('active');
                difficultySelector.classList.remove('show');
            } else {
                buttons[1].classList.add('active');
                difficultySelector.classList.add('show');
            }
            resetPoints();
            restartGame();
        }

        function setDifficulty(level) {
            difficulty = level;
            restartGame();
        }

        function handleCellClick(e) {
            const cell = e.target;
            const index = parseInt(cell.dataset.index);

            if (!gameActive || isComputerTurn) {
                return;
            }

            if (activeSkill === 'block') {
                if (board[index] === '' && !blockedCells.includes(index)) {
                    blockedCells.push(index);
                    cell.classList.add('blocked');
                    points -= 2;
                    activeSkill = null;
                    selectedSkill = null;
                    updatePoints();
                    updateSkillButtons();
                    statusDisplay.textContent = `轮到 ${currentPlayer} 下棋`;
                }
                return;
            }

            if (activeSkill === 'remove') {
                const opponent = currentPlayer === 'X' ? 'O' : 'X';
                if (board[index] === opponent) {
                    if (selectedCellIndex !== null) {
                        cells[selectedCellIndex].classList.remove('selected');
                    }
                    selectedCellIndex = index;
                    cell.classList.add('selected');
                    confirmTitle.textContent = `确认消除这个 ${opponent} 棋子？`;
                    confirmDialog.classList.add('show');
                }
                return;
            }

            if (board[index] !== '' || blockedCells.includes(index)) {
                return;
            }

            makeMove(cell, index);
            checkResult();

            if (gameActive && gameMode === 'pve' && currentPlayer === 'O') {
                isComputerTurn = true;
                statusDisplay.textContent = '🤖 AI 思考中...';
                setTimeout(computerMove, 500);
            }
        }

        function confirmRemoval() {
            if (selectedCellIndex === null) return;

            const cell = cells[selectedCellIndex];
            const opponent = currentPlayer === 'X' ? 'O' : 'X';

            board[selectedCellIndex] = '';
            cell.textContent = '';
            cell.classList.remove('taken', opponent.toLowerCase(), 'selected');
            cell.classList.add('removing');
            setTimeout(() => cell.classList.remove('removing'), 300);

            points -= 2;
            activeSkill = null;
            selectedSkill = null;
            selectedCellIndex = null;
            gameContainer.classList.remove('selecting-mode');
            confirmDialog.classList.remove('show');
            updatePoints();
            updateSkillButtons();
            statusDisplay.textContent = `轮到 ${currentPlayer} 下棋`;
        }

        function cancelRemoval() {
            if (selectedCellIndex !== null) {
                cells[selectedCellIndex].classList.remove('selected');
                selectedCellIndex = null;
            }
            gameContainer.classList.remove('selecting-mode');
            confirmDialog.classList.remove('show');
        }

        function computerMove() {
            if (!gameActive) return;

            let move;
            switch (difficulty) {
                case 'easy':
                    move = getRandomMove();
                    break;
                case 'medium':
                    move = Math.random() < 0.7 ? getBestMove() : getRandomMove();
                    break;
                case 'hard':
                    move = getBestMove();
                    break;
            }

            if (move !== -1) {
                const cell = cells[move];
                makeMove(cell, move);
                checkResult();
            }
            isComputerTurn = false;
        }

        function getRandomMove() {
            const availableMoves = [];
            for (let i = 0; i < board.length; i++) {
                if (board[i] === '' && !blockedCells.includes(i)) {
                    availableMoves.push(i);
                }
            }
            return availableMoves[Math.floor(Math.random() * availableMoves.length)];
        }

        function getBestMove() {
            let bestScore = -Infinity;
            let bestMove = -1;

            for (let i = 0; i < board.length; i++) {
                if (board[i] === '' && !blockedCells.includes(i)) {
                    board[i] = 'O';
                    let score = minimax(board, 0, false);
                    board[i] = '';
                    if (score > bestScore) {
                        bestScore = score;
                        bestMove = i;
                    }
                }
            }
            return bestMove;
        }

        function minimax(board, depth, isMaximizing) {
            const winner = checkWinner(board);
            if (winner === 'O') return 10 - depth;
            if (winner === 'X') return depth - 10;
            if (!board.includes('')) return 0;

            if (isMaximizing) {
                let bestScore = -Infinity;
                for (let i = 0; i < board.length; i++) {
                    if (board[i] === '') {
                        board[i] = 'O';
                        let score = minimax(board, depth + 1, false);
                        board[i] = '';
                        bestScore = Math.max(score, bestScore);
                    }
                }
                return bestScore;
            } else {
                let bestScore = Infinity;
                for (let i = 0; i < board.length; i++) {
                    if (board[i] === '') {
                        board[i] = 'X';
                        let score = minimax(board, depth + 1, true);
                        board[i] = '';
                        bestScore = Math.min(score, bestScore);
                    }
                }
                return bestScore;
            }
        }

        function checkWinner(board) {
            for (let i = 0; i < winningCombinations.length; i++) {
                const [a, b, c] = winningCombinations[i];
                if (board[a] && board[a] === board[b] && board[a] === board[c]) {
                    return board[a];
                }
            }
            return null;
        }

        function makeMove(cell, index) {
            board[index] = currentPlayer;
            cell.textContent = currentPlayer;
            cell.classList.add('taken', currentPlayer.toLowerCase());
        }

        function checkResult() {
            let roundWon = false;
            let winningLine = [];

            for (let i = 0; i < winningCombinations.length; i++) {
                const [a, b, c] = winningCombinations[i];
                if (board[a] && board[a] === board[b] && board[a] === board[c]) {
                    roundWon = true;
                    winningLine = [a, b, c];
                    break;
                }
            }

            if (roundWon) {
                statusDisplay.textContent = `🎉 ${currentPlayer} 获胜！`;
                gameActive = false;
                scores[currentPlayer]++;
                updateScores();
                highlightWinner(winningLine);
                if (currentPlayer === 'X' || gameMode === 'pvp') {
                    points++;
                    updatePoints();
                }
                return;
            }

            if (!board.includes('')) {
                statusDisplay.textContent = '🤝 平局！';
                gameActive = false;
                scores.draw++;
                updateScores();
                return;
            }

            currentPlayer = currentPlayer === 'X' ? 'O' : 'X';
            if (gameMode === 'pve' && currentPlayer === 'O') {
                statusDisplay.textContent = `🤖 AI (O) 回合`;
            } else {
                statusDisplay.textContent = `轮到 ${currentPlayer} 下棋`;
            }
        }

        function highlightWinner(line) {
            line.forEach(index => {
                cells[index].classList.add('winner');
            });
        }

        function updateScores() {
            xScoreDisplay.textContent = scores.X;
            oScoreDisplay.textContent = scores.O;
            drawScoreDisplay.textContent = scores.draw;
        }

        function restartGame() {
            board = ['', '', '', '', '', '', '', '', ''];
            gameActive = true;
            currentPlayer = 'X';
            isComputerTurn = false;
            activeSkill = null;
            selectedSkill = null;
            selectedCellIndex = null;
            blockedCells = [];
            gameContainer.classList.remove('selecting-mode');

            if (gameMode === 'pve') {
                statusDisplay.textContent = `轮到 ${currentPlayer} (你) 下棋`;
            } else {
                statusDisplay.textContent = '轮到 X 下棋';
            }

            cells.forEach(cell => {
                cell.textContent = '';
                cell.classList.remove('taken', 'x', 'o', 'winner', 'blocked', 'selected');
            });

            updateSkillButtons();
        }

        function resetPoints() {
            points = 0;
            updatePoints();
        }

        function updatePoints() {
            pointsDisplay.textContent = points;
            updateSkillButtons();
        }

        function updateSkillButtons() {
            const costs = { block: 2, instant: 10, remove: 2 };
            Object.keys(skillBtns).forEach(skill => {
                if (selectedSkill && selectedSkill !== skill) {
                    skillBtns[skill].disabled = true;
                } else {
                    skillBtns[skill].disabled = points < costs[skill] || !gameActive;
                }
                skillBtns[skill].classList.remove('confirming');
                if (activeSkill === skill) {
                    skillBtns[skill].classList.add('active');
                } else {
                    skillBtns[skill].classList.remove('active');
                }
            });
            cancelBtn.classList.toggle('show', !!selectedSkill || !!selectedCellIndex);
        }

        function useSkill(skill) {
            const costs = { block: 2, instant: 10, remove: 2 };
            if (points < costs[skill] || !gameActive || activeSkill) return;

            if (selectedSkill === skill) {
                confirmSkill(skill);
                return;
            }

            selectedSkill = skill;
            skillBtns[skill].classList.add('confirming');
            updateSkillButtons();

            if (skill === 'block') {
                statusDisplay.textContent = '🔒 再次点击确认使用封印格子';
            } else if (skill === 'remove') {
                statusDisplay.textContent = '💥 再次点击确认使用消除棋子';
            } else if (skill === 'instant') {
                statusDisplay.textContent = '🏆 再次点击确认使用直接胜利';
            }
        }

        function confirmSkill(skill) {
            const costs = { block: 2, instant: 10, remove: 2 };

            if (skill === 'instant') {
                points -= costs[skill];
                updatePoints();
                selectedSkill = null;
                statusDisplay.textContent = `🎉 ${currentPlayer} 使用了直接胜利！`;
                gameActive = false;
                scores[currentPlayer]++;
                updateScores();
                return;
            }

            activeSkill = skill;
            selectedSkill = null;

            if (skill === 'block') {
                statusDisplay.textContent = '🔒 选择一个空格子进行封印';
            } else if (skill === 'remove') {
                statusDisplay.textContent = '💥 选择一个对方的棋子进行消除';
                gameContainer.classList.add('selecting-mode');
            }

            updateSkillButtons();
        }

        function cancelSkill() {
            if (!selectedSkill && !selectedCellIndex) return;

            if (selectedCellIndex !== null) {
                cells[selectedCellIndex].classList.remove('selected');
                selectedCellIndex = null;
            }

            if (activeSkill === 'remove') {
                gameContainer.classList.remove('selecting-mode');
            }

            selectedSkill = null;
            activeSkill = null;
            updateSkillButtons();
            statusDisplay.textContent = `轮到 ${currentPlayer} 下棋`;
        }
    </script>
</body>
</html>
