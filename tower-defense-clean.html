<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>塔防游戏</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #0f3460, #16213e, #1a1a2e);
            color: white;
            overflow: hidden;
        }
        canvas {
            display: block;
            cursor: crosshair;
        }
        .ui-panel {
            position: fixed;
            background: rgba(0, 0, 0, 0.7);
            backdrop-filter: blur(10px);
            border: 2px solid rgba(78, 205, 196, 0.5);
            border-radius: 10px;
            padding: 15px;
            z-index: 10;
        }
        .top-bar {
            top: 10px;
            left: 10px;
            right: 10px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .stat {
            display: inline-block;
            margin-right: 20px;
            font-size: 18px;
        }
        .stat-value {
            color: #ffd700;
            font-weight: bold;
        }
        .tower-selector {
            left: 10px;
            top: 70px;
            width: 70px;
        }
        .tower-btn {
            display: block;
            width: 100%;
            padding: 10px;
            margin: 5px 0;
            background: linear-gradient(135deg, #2d3748, #1a202c);
            border: 2px solid #4a5568;
            border-radius: 5px;
            color: white;
            font-size: 24px;
            cursor: pointer;
            transition: all 0.3s;
        }
        .tower-btn:hover {
            border-color: #ffd700;
            transform: scale(1.05);
        }
        .tower-btn.selected {
            border-color: #ffd700;
            background: linear-gradient(135deg, #4ecdc4, #44a08d);
        }
        .controls {
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            gap: 15px;
        }
        .btn {
            padding: 15px 30px;
            background: linear-gradient(135deg, #4ecdc4, #44a08d);
            border: none;
            border-radius: 8px;
            color: white;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s;
        }
        .btn:hover {
            transform: scale(1.05);
        }
        .btn.restart {
            background: linear-gradient(135deg, #ffd700, #ff8c00);
        }
        .info-panel {
            right: 10px;
            top: 70px;
            width: 200px;
        }
        .info-title {
            color: #4ecdc4;
            font-size: 14px;
            margin-bottom: 10px;
        }
        .info-text {
            font-size: 13px;
            color: #ccc;
            line-height: 1.4;
        }
    </style>
</head>
<body>
    <canvas id="gameCanvas"></canvas>
    
    <div class="ui-panel top-bar">
        <div class="stat">💰 金币: <span class="stat-value" id="gold">150</span></div>
        <div class="stat">⚔️ 波数: <span class="stat-value" id="wave">1</span></div>
        <div class="stat">❤️ 生命: <span class="stat-value" id="health">100</span></div>
        <div class="stat">💀 击杀: <span class="stat-value" id="kills">0</span></div>
    </div>
    
    <div class="ui-panel tower-selector">
        <div class="info-title">防御塔</div>
        <button class="tower-btn selected" data-type="arrow" onclick="selectTower('arrow')">🏹</button>
        <button class="tower-btn" data-type="gun" onclick="selectTower('gun')">🔫</button>
        <button class="tower-btn" data-type="cannon" onclick="selectTower('cannon')">💣</button>
        <button class="tower-btn" data-type="laser" onclick="selectTower('laser')">💥</button>
        <button class="tower-btn" data-type="ice" onclick="selectTower('ice')">❄️</button>
    </div>
    
    <div class="ui-panel info-panel">
        <div class="info-title" id="towerName">箭头塔</div>
        <div class="info-text" id="towerDesc">基本防御塔，射速快但伤害较低</div>
        <div class="info-text" style="margin-top: 10px; color: #4ecdc4;">成本: <span id="towerCost">20</span> 金币</div>
    </div>
    
    <div class="ui-panel controls">
        <button class="btn" onclick="startWave()" id="startBtn">开始波数</button>
        <button class="btn restart" onclick="restartGame()">重新开始</button>
    </div>

    <script>
        // 游戏配置
        const GRID_SIZE = 50;
        
        // 游戏状态
        let gameState = {
            gold: 150,
            wave: 1,
            health: 100,
            kills: 0,
            enemies: [],
            towers: [],
            selectedTower: 'arrow',
            waveActive: false,
            path: []
        };
        
        // 塔类型
        const towerTypes = {
            arrow: { name: '箭头塔', desc: '基本防御塔，射速快但伤害较低', cost: 20, damage: 8, range: 120, cooldown: 500, color: '#4ecdc4', icon: '🏹' },
            gun: { name: '枪塔', desc: '中等伤害，中等射速', cost: 40, damage: 20, range: 180, cooldown: 800, color: '#ff6b6b', icon: '🔫' },
            cannon: { name: '炮塔', desc: '高伤害，慢射速，范围伤害', cost: 70, damage: 30, range: 240, cooldown: 1500, color: '#ffd700', icon: '💣' },
            laser: { name: '激光塔', desc: '极高伤害，穿透攻击', cost: 100, damage: 50, range: 320, cooldown: 1000, color: '#9b59b6', icon: '💥' },
            ice: { name: '冰冻塔', desc: '减速敌人，低伤害', cost: 50, damage: 10, range: 160, cooldown: 1200, color: '#3498db', icon: '❄️' }
        };
        
        // Canvas相关
        let canvas, ctx;
        
        // 初始化
        function init() {
            console.log('游戏初始化开始...');
            
            canvas = document.getElementById('gameCanvas');
            ctx = canvas.getContext('2d');
            
            resizeCanvas();
            createPath();
            
            window.addEventListener('resize', resizeCanvas);
            canvas.addEventListener('click', handleCanvasClick);
            
            console.log('游戏初始化完成');
            gameLoop();
        }
        
        // 调整画布大小
        function resizeCanvas() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
            createPath();
        }
        
        // 创建路径
        function createPath() {
            const gridWidth = Math.floor(canvas.width / GRID_SIZE);
            const gridHeight = Math.floor(canvas.height / GRID_SIZE);
            
            gameState.path = [];
            
            const startX = Math.floor(gridWidth * 0.1);
            const startY = Math.floor(gridHeight * 0.5);
            const midX1 = Math.floor(gridWidth * 0.4);
            const midX2 = Math.floor(gridWidth * 0.6);
            const lowY = Math.floor(gridHeight * 0.85);
            const highY = Math.floor(gridHeight * 0.15);
            const endX = Math.floor(gridWidth * 0.9);
            
            // 创建路径点
            for (let x = startX; x < midX1; x++) {
                gameState.path.push({ x: x * GRID_SIZE + GRID_SIZE/2, y: startY * GRID_SIZE + GRID_SIZE/2 });
            }
            for (let y = startY; y < lowY; y++) {
                gameState.path.push({ x: midX1 * GRID_SIZE + GRID_SIZE/2, y: y * GRID_SIZE + GRID_SIZE/2 });
            }
            for (let x = midX1; x < midX2; x++) {
                gameState.path.push({ x: x * GRID_SIZE + GRID_SIZE/2, y: lowY * GRID_SIZE + GRID_SIZE/2 });
            }
            for (let y = lowY; y > highY; y--) {
                gameState.path.push({ x: midX2 * GRID_SIZE + GRID_SIZE/2, y: y * GRID_SIZE + GRID_SIZE/2 });
            }
            for (let x = midX2; x <= endX; x++) {
                gameState.path.push({ x: x * GRID_SIZE + GRID_SIZE/2, y: highY * GRID_SIZE + GRID_SIZE/2 });
            }
        }
        
        // 画布点击处理
        function handleCanvasClick(e) {
            const rect = canvas.getBoundingClientRect();
            const x = e.clientX - rect.left;
            const y = e.clientY - rect.top;
            
            console.log('画布点击:', x, y);
            
            // 对齐到网格
            const gridX = Math.floor(x / GRID_SIZE);
            const gridY = Math.floor(y / GRID_SIZE);
            const towerX = gridX * GRID_SIZE + GRID_SIZE/2;
            const towerY = gridY * GRID_SIZE + GRID_SIZE/2;
            
            // 检查是否在路径上
            const onPath = gameState.path.some(p => 
                Math.abs(p.x - towerX) < GRID_SIZE/2 && Math.abs(p.y - towerY) < GRID_SIZE/2
            );
            
            if (onPath) {
                console.log('不能在路径上建造');
                return;
            }
            
            // 检查金币
            const towerType = towerTypes[gameState.selectedTower];
            if (gameState.gold < towerType.cost) {
                console.log('金币不足');
                return;
            }
            
            // 建造塔
            gameState.gold -= towerType.cost;
            gameState.towers.push({
                type: gameState.selectedTower,
                x: towerX,
                y: towerY,
                ...towerType,
                lastShot: 0,
                level: 1
            });
            
            console.log('建造了塔:', towerType.name);
            updateUI();
        }
        
        // 选择塔
        function selectTower(type) {
            gameState.selectedTower = type;
            document.querySelectorAll('.tower-btn').forEach(btn => {
                btn.classList.toggle('selected', btn.dataset.type === type);
            });
            
            const tower = towerTypes[type];
            document.getElementById('towerName').textContent = tower.name;
            document.getElementById('towerDesc').textContent = tower.desc;
            document.getElementById('towerCost').textContent = tower.cost;
        }
        
        // 开始波数
        function startWave() {
            if (gameState.waveActive) return;
            
            gameState.waveActive = true;
            document.getElementById('startBtn').textContent = '进行中...';
            document.getElementById('startBtn').disabled = true;
            
            // 生成敌人
            const enemyCount = 10 + gameState.wave * 2;
            for (let i = 0; i < enemyCount; i++) {
                gameState.enemies.push({
                    x: gameState.path[0].x,
                    y: gameState.path[0].y,
                    pathIndex: 1,
                    health: 20 + gameState.wave * 5,
                    maxHealth: 20 + gameState.wave * 5,
                    speed: 2 + Math.random(),
                    color: '#ff6b6b',
                    size: 15,
                    alive: true
                });
            }
            
            console.log(`开始波数 ${gameState.wave}，${enemyCount} 个敌人`);
        }
        
        // 重新开始
        function restartGame() {
            gameState = {
                gold: 150,
                wave: 1,
                health: 100,
                kills: 0,
                enemies: [],
                towers: [],
                selectedTower: 'arrow',
                waveActive: false,
                path: gameState.path
            };
            
            document.getElementById('startBtn').textContent = '开始波数';
            document.getElementById('startBtn').disabled = false;
            updateUI();
        }
        
        // 更新UI
        function updateUI() {
            document.getElementById('gold').textContent = gameState.gold;
            document.getElementById('wave').textContent = gameState.wave;
            document.getElementById('health').textContent = gameState.health;
            document.getElementById('kills').textContent = gameState.kills;
        }
        
        // 游戏主循环
        function gameLoop() {
            update();
            draw();
            requestAnimationFrame(gameLoop);
        }
        
        // 更新游戏逻辑
        function update() {
            const now = Date.now();
            
            // 更新敌人
            gameState.enemies.forEach(enemy => {
                if (!enemy.alive) return;
                
                // 移动敌人
                if (enemy.pathIndex < gameState.path.length) {
                    const target = gameState.path[enemy.pathIndex];
                    const dx = target.x - enemy.x;
                    const dy = target.y - enemy.y;
                    const dist = Math.sqrt(dx*dx + dy*dy);
                    
                    if (dist < enemy.speed) {
                        enemy.x = target.x;
                        enemy.y = target.y;
                        enemy.pathIndex++;
                    } else {
                        enemy.x += (dx / dist) * enemy.speed;
                        enemy.y += (dy / dist) * enemy.speed;
                    }
                } else {
                    // 敌人到达终点
                    enemy.alive = false;
                    gameState.health -= 10;
                    updateUI();
                    
                    if (gameState.health <= 0) {
                        alert('游戏结束！');
                        restartGame();
                    }
                }
            });
            
            // 塔攻击
            gameState.towers.forEach(tower => {
                if (now - tower.lastShot < tower.cooldown) return;
                
                // 寻找目标
                let target = null;
                let minDist = Infinity;
                
                gameState.enemies.forEach(enemy => {
                    if (!enemy.alive) return;
                    
                    const dist = Math.sqrt((tower.x - enemy.x)**2 + (tower.y - enemy.y)**2);
                    if (dist < tower.range && dist < minDist) {
                        target = enemy;
                        minDist = dist;
                    }
                });
                
                if (target) {
                    tower.lastShot = now;
                    target.health -= tower.damage;
                    
                    if (target.health <= 0) {
                        target.alive = false;
                        gameState.gold += 5 + gameState.wave;
                        gameState.kills++;
                        updateUI();
                    }
                }
            });
            
            // 清理死亡敌人
            gameState.enemies = gameState.enemies.filter(e => e.alive);
            
            // 检查波数完成
            if (gameState.waveActive && gameState.enemies.length === 0) {
                gameState.waveActive = false;
                gameState.wave++;
                gameState.gold += 50;
                
                document.getElementById('startBtn').textContent = `开始波数 ${gameState.wave}`;
                document.getElementById('startBtn').disabled = false;
                updateUI();
            }
        }
        
        // 绘制游戏
        function draw() {
            // 清空画布
            ctx.fillStyle = '#1a1a2e';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            
            // 绘制网格
            ctx.strokeStyle = 'rgba(255,255,255,0.1)';
            ctx.lineWidth = 1;
            for (let x = 0; x < canvas.width; x += GRID_SIZE) {
                ctx.beginPath();
                ctx.moveTo(x, 0);
                ctx.lineTo(x, canvas.height);
                ctx.stroke();
            }
            for (let y = 0; y < canvas.height; y += GRID_SIZE) {
                ctx.beginPath();
                ctx.moveTo(0, y);
                ctx.lineTo(canvas.width, y);
                ctx.stroke();
            }
            
            // 绘制路径
            if (gameState.path.length > 0) {
                ctx.strokeStyle = '#2ecc71';
                ctx.lineWidth = 6;
                ctx.lineCap = 'round';
                ctx.lineJoin = 'round';
                ctx.beginPath();
                ctx.moveTo(gameState.path[0].x, gameState.path[0].y);
                gameState.path.forEach(p => ctx.lineTo(p.x, p.y));
                ctx.stroke();
                
                // 绘制起点和终点
                ctx.fillStyle = '#2ecc71';
                ctx.beginPath();
                ctx.arc(gameState.path[0].x, gameState.path[0].y, 12, 0, Math.PI * 2);
                ctx.fill();
                
                ctx.fillStyle = '#e74c3c';
                ctx.beginPath();
                ctx.arc(gameState.path[gameState.path.length-1].x, gameState.path[gameState.path.length-1].y, 12, 0, Math.PI * 2);
                ctx.fill();
            }
            
            // 绘制塔
            gameState.towers.forEach(tower => {
                ctx.fillStyle = tower.color;
                ctx.beginPath();
                ctx.arc(tower.x, tower.y, 20, 0, Math.PI * 2);
                ctx.fill();
                
                // 塔图标
                ctx.font = '24px Arial';
                ctx.fillStyle = '#fff';
                ctx.textAlign = 'center';
                ctx.textBaseline = 'middle';
                ctx.fillText(tower.icon, tower.x, tower.y);
            });
            
            // 绘制敌人
            gameState.enemies.forEach(enemy => {
                ctx.fillStyle = enemy.color;
                ctx.beginPath();
                ctx.arc(enemy.x, enemy.y, enemy.size, 0, Math.PI * 2);
                ctx.fill();
                
                // 生命条
                const barWidth = enemy.size * 2;
                const barHeight = 4;
                const barX = enemy.x - barWidth/2;
                const barY = enemy.y - enemy.size - 8;
                
                ctx.fillStyle = '#333';
                ctx.fillRect(barX, barY, barWidth, barHeight);
                ctx.fillStyle = '#2ecc71';
                ctx.fillRect(barX, barY, barWidth * (enemy.health / enemy.maxHealth), barHeight);
            });
        }
        
        // 启动游戏
        window.onload = init;
    </script>
</body>
</html>
