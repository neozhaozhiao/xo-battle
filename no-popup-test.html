<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>无弹窗测试</title>
    <style>
        body {
            background: #1e1e3f;
            color: white;
            font-family: Arial, sans-serif;
            padding: 20px;
            max-width: 800px;
            margin: 0 auto;
        }
        h1 { color: #4ecdc4; }
        h2 { color: #ffd700; margin-top: 30px; }
        button {
            padding: 15px 40px;
            font-size: 18px;
            background: #4ecdc4;
            border: none;
            border-radius: 8px;
            color: white;
            cursor: pointer;
            margin: 5px;
        }
        button:hover { background: #44a08d; }
        #output {
            background: #0a0a0a;
            border: 2px solid #4ecdc4;
            border-radius: 10px;
            padding: 20px;
            margin-top: 20px;
            min-height: 200px;
        }
        .log { padding: 5px; margin: 2px 0; border-radius: 3px; }
        .success { background: rgba(0, 255, 0, 0.2); color: #0f0; }
        .error { background: rgba(255, 0, 0, 0.2); color: #f66; }
        .info { background: rgba(0, 150, 255, 0.2); color: #6cf; }
    </style>
</head>
<body>
    <h1>🧪 JavaScript 无弹窗测试</h1>
    <p>这个页面不使用弹窗，所有结果都会显示在下面的日志框中</p>

    <h2>📊 测试区域</h2>
    <button onclick="test1()">测试1: 基本功能</button>
    <button onclick="test2()">测试2: DOM操作</button>
    <button onclick="test3()">测试3: 事件监听</button>
    <button onclick="startOriginalGame()">🎮 启动原始游戏</button>

    <h2>📋 测试日志</h2>
    <div id="output">
        <div class="log info">等待测试...</div>
    </div>

    <script>
        function addLog(message, type = 'info') {
            const output = document.getElementById('output');
            const time = new Date().toLocaleTimeString();
            const log = document.createElement('div');
            log.className = 'log ' + type;
            log.textContent = `[${time}] ${message}`;
            output.insertBefore(log, output.firstChild);
            console.log(message);
        }

        function test1() {
            addLog('✅ 测试1: JavaScript基本功能正常', 'success');
            addLog('   onclick事件工作正常', 'success');
        }

        function test2() {
            try {
                const testDiv = document.createElement('div');
                testDiv.textContent = 'DOM操作测试';
                document.body.appendChild(testDiv);
                document.body.removeChild(testDiv);
                addLog('✅ 测试2: DOM操作正常', 'success');
            } catch (e) {
                addLog('❌ 测试2失败: ' + e.message, 'error');
            }
        }

        function test3() {
            addLog('✅ 测试3: 事件监听正常', 'success');
            addLog('   当前时间: ' + new Date().toLocaleString(), 'info');
        }

        function startOriginalGame() {
            addLog('🎮 准备启动原始游戏...', 'info');

            // 检查原始文件是否存在
            fetch('tower-final.html')
                .then(response => {
                    if (response.ok) {
                        addLog('✅ 找到 tower-final.html 文件', 'success');
                        addLog('🔄 正在跳转到游戏页面...', 'info');
                        setTimeout(() => {
                            window.location.href = 'tower-final.html';
                        }, 1000);
                    } else {
                        addLog('❌ 无法读取 tower-final.html', 'error');
                    }
                })
                .catch(e => {
                    addLog('❌ 文件读取失败: ' + e.message, 'error');
                    addLog('💡 尝试直接打开文件...', 'info');
                    setTimeout(() => {
                        window.location.href = 'tower-final.html';
                    }, 2000);
                });
        }

        // 页面加载时自动测试
        window.onload = function() {
            addLog('📄 页面加载完成', 'success');
            addLog('🌐 浏览器: ' + navigator.userAgent.substring(0, 50) + '...', 'info');
            addLog('📱 屏幕尺寸: ' + window.innerWidth + ' x ' + window.innerHeight, 'info');
            addLog('✅ JavaScript 已启用并正常运行', 'success');
        };
    </script>
</body>
</html>
