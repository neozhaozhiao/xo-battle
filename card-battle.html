<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>卡牌对战 - 杀戮尖塔风格</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            padding: 10px;
            overflow-x: hidden;
        }

        .header {
            text-align: center;
            margin-bottom: 20px;
        }

        h1 {
            color: #fff;
            font-size: 2.5em;
            text-shadow: 0 0 20px rgba(255, 215, 0, 0.5);
            margin-bottom: 10px;
            animation: title-glow 3s ease-in-out infinite;
        }

        @media (max-width: 768px) {
            h1 {
                font-size: 1.5em;
            }
        }

        @keyframes title-glow {
            0%, 100% {
                text-shadow: 0 0 20px rgba(255, 215, 0, 0.5), 0 0 40px rgba(255, 215, 0, 0.3);
            }
            50% {
                text-shadow: 0 0 30px rgba(255, 215, 0, 0.8), 0 0 60px rgba(255, 215, 0, 0.5);
            }
        }

        .stats {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-bottom: 15px;
        }

        @media (max-width: 768px) {
            .stats {
                gap: 10px;
            }
        }

        .stat-item {
            background: rgba(255, 255, 255, 0.1);
            padding: 10px 20px;
            border-radius: 10px;
            color: #fff;
            backdrop-filter: blur(10px);
            transition: all 0.3s ease;
        }

        @media (max-width: 768px) {
            .stat-item {
                padding: 8px 12px;
            }
        }

        .stat-label {
            font-size: 0.9em;
            color: #aaa;
            margin-bottom: 5px;
        }

        .stat-value {
            font-size: 1.5em;
            font-weight: bold;
            color: #ffd700;
        }

        .game-area {
            display: grid;
            grid-template-columns: 300px 1fr 350px 280px;
            gap: 15px;
            max-width: 1600px;
            margin: 0 auto;
            flex: 1;
        }

        @media (max-width: 1400px) {
            .game-area {
                grid-template-columns: 1fr 1fr;
                grid-template-rows: auto auto;
            }
        }

        @media (max-width: 768px) {
            .game-area {
                grid-template-columns: 1fr;
                gap: 10px;
            }
        }

        .player-area {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .player-info {
            background: rgba(255, 255, 255, 0.1);
            padding: 15px;
            border-radius: 15px;
            display: flex;
            flex-direction: column;
            gap: 10px;
            backdrop-filter: blur(10px);
        }

        .player-info-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            width: 100%;
        }

        .player-name {
            color: #fff;
            font-size: 1.2em;
            font-weight: bold;
        }

        .player-name.enemy {
            color: #ff6b6b;
        }

        .player-name.player {
            color: #4ecdc4;
        }

        .health-bar-container {
            width: 200px;
            height: 20px;
            background: #333;
            border-radius: 10px;
            overflow: hidden;
        }

        .health-bar {
            height: 100%;
            background: linear-gradient(90deg, #4ecdc4, #44a08d);
            transition: width 0.5s ease;
            position: relative;
        }

        .health-bar::after {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.3), transparent);
            animation: health-shine 2s ease-in-out infinite;
        }

        @keyframes health-shine {
            0% { transform: translateX(-100%); }
            100% { transform: translateX(100%); }
        }

        .health-bar.enemy {
            background: linear-gradient(90deg, #ff6b6b, #ee5a5a);
        }

        .health-text {
            color: #fff;
            font-size: 0.9em;
            margin-left: 10px;
        }

        .block-display {
            display: flex;
            align-items: center;
            gap: 5px;
            background: rgba(0, 100, 200, 0.3);
            padding: 8px 15px;
            border-radius: 8px;
            margin: 10px 0;
        }

        .block-display.enemy {
            background: rgba(255, 100, 100, 0.3);
        }

        .block-icon {
            font-size: 1.5em;
        }

        .block-value {
            font-size: 1.5em;
            font-weight: bold;
            color: #4ecdc4;
        }

        .block-display.enemy .block-value {
            color: #ff6b6b;
        }

        .energy-display {
            display: flex;
            align-items: center;
            gap: 10px;
            background: rgba(255, 215, 0, 0.2);
            padding: 10px 20px;
            border-radius: 8px;
            margin-top: 10px;
        }

        .energy-icon {
            font-size: 1.8em;
        }

        .energy-value {
            font-size: 1.5em;
            font-weight: bold;
            color: #ffd700;
        }

        .enemy-intention {
            background: rgba(255, 100, 100, 0.2);
            padding: 10px 15px;
            border-radius: 8px;
            display: flex;
            align-items: center;
            gap: 10px;
            margin-top: 10px;
        }

        .intention-icon {
            font-size: 1.8em;
        }

        .intention-text {
            font-size: 1.1em;
            font-weight: bold;
            color: #ff6b6b;
        }

        .player-stats {
            display: flex;
            gap: 10px;
            margin-bottom: 10px;
        }

        .stat-block {
            background: rgba(255, 255, 255, 0.1);
            padding: 8px 15px;
            border-radius: 8px;
            text-align: center;
        }

        .stat-block .stat-label {
            font-size: 0.7em;
            color: #aaa;
        }

        .stat-block .stat-value {
            font-size: 1.3em;
            font-weight: bold;
        }

        .hand {
            background: rgba(255, 255, 255, 0.05);
            border-radius: 15px;
            padding: 10px;
            display: flex;
            gap: 10px;
            justify-content: center;
            flex-wrap: wrap;
            min-height: 200px;
            backdrop-filter: blur(10px);
        }

        @media (max-width: 768px) {
            .hand {
                padding: 5px;
                gap: 5px;
                min-height: 150px;
            }
        }

        .card {
            width: 130px;
            height: 180px;
            background: linear-gradient(145deg, #2d3748, #1a202c);
            border: 3px solid #4a5568;
            border-radius: 10px;
            cursor: pointer;
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            animation: card-appear 0.5s ease-out;
        }

        @media (max-width: 768px) {
            .card {
                width: 90px;
                height: 125px;
            }
        }

        @media (max-width: 480px) {
            .card {
                width: 75px;
                height: 105px;
            }
        }

        @keyframes card-appear {
            0% {
                opacity: 0;
                transform: translateY(20px) scale(0.8);
            }
            100% {
                opacity: 1;
                transform: translateY(0) scale(1);
            }
        }

        .card:hover {
            transform: translateY(-10px) scale(1.05);
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
        }

        .card-cost {
            position: absolute;
            top: 5px;
            right: 5px;
            width: 30px;
            height: 30px;
            background: linear-gradient(135deg, #ffd700, #ff8c00);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            color: #000;
            font-size: 1.1em;
            z-index: 2;
            box-shadow: 0 2px 8px rgba(255, 215, 0, 0.3);
        }

        .card-upgrade-badge {
            position: absolute;
            bottom: 5px;
            right: 5px;
            font-size: 0.8em;
            font-weight: bold;
            color: #ffd700;
        }

        .card-rarity {
            position: absolute;
            top: 5px;
            left: 5px;
            width: 20px;
            height: 20px;
            border-radius: 50%;
            animation: rarity-glow 2s ease-in-out infinite;
        }

        .card-rarity.common { background: #a0a0a0; }
        .card-rarity.rare { background: #4ecdc4; }
        .card-rarity.epic { background: #9b59b6; }
        .card-rarity.legendary { background: #ffd700; }

        @keyframes rarity-glow {
            0%, 100% { box-shadow: 0 0 5px currentColor; }
            50% { box-shadow: 0 0 10px currentColor; }
        }

        .card[data-rarity="legendary"] {
            animation: legendary-glow 3s ease-in-out infinite;
        }

        @keyframes legendary-glow {
            0%, 100% {
                box-shadow: 0 0 10px rgba(255, 215, 0, 0.5), inset 0 0 10px rgba(255, 215, 0, 0.1);
            }
            50% {
                box-shadow: 0 0 20px rgba(255, 215, 0, 0.8), inset 0 0 20px rgba(255, 215, 0, 0.2);
            }
        }

        .card-image {
            width: 100%;
            height: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 3em;
            margin-top: 5px;
        }

        @media (max-width: 768px) {
            .card-image {
                font-size: 2em;
            }
        }

        @media (max-width: 480px) {
            .card-image {
                font-size: 1.5em;
            }
        }

        .card-info {
            padding: 8px;
            text-align: center;
            flex: 1;
            display: flex;
            flex-direction: column;
        }

        .card-name {
            color: #fff;
            font-size: 0.8em;
            font-weight: bold;
            margin-bottom: 5px;
        }

        .card-desc {
            color: #ccc;
            font-size: 0.6em;
            line-height: 1.2;
            flex: 1;
            overflow: hidden;
        }

        .achievements {
            background: rgba(255, 255, 255, 0.1);
            padding: 15px;
            border-radius: 15px;
        }

        @media (max-width: 768px) {
            .achievements {
                padding: 10px;
            }
        }

        .achievements-title {
            color: #ffd700;
            font-size: 1.2em;
            font-weight: bold;
            margin-bottom: 15px;
        }

        .achievement-list {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .achievement {
            background: rgba(255, 255, 255, 0.05);
            padding: 12px;
            border-radius: 8px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .achievement.locked {
            opacity: 0.5;
            filter: grayscale(1);
        }

        .achievement-icon {
            font-size: 1.5em;
        }

        .achievement-info {
            flex: 1;
        }

        .achievement-name {
            color: #fff;
            font-size: 0.9em;
            font-weight: bold;
        }

        .achievement-desc {
            color: #aaa;
            font-size: 0.8em;
        }

        .battle-log {
            background: rgba(255, 255, 255, 0.05);
            padding: 15px;
            border-radius: 15px;
            max-height: 200px;
            overflow-y: auto;
        }

        @media (max-width: 768px) {
            .battle-log {
                max-height: 150px;
                padding: 10px;
            }
        }

        .battle-log-title {
            color: #ffd700;
            font-size: 1.2em;
            font-weight: bold;
            margin-bottom: 10px;
        }

        .log-entry {
            color: #fff;
            font-size: 0.85em;
            padding: 5px 0;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        }

        .log-entry.player {
            color: #4ecdc4;
        }

        .log-entry.enemy {
            color: #ff6b6b;
        }

        .action-area {
            display: flex;
            gap: 15px;
            justify-content: center;
            margin-top: 10px;
            align-items: center;
            flex-wrap: wrap;
        }

        @media (max-width: 768px) {
            .action-area {
                gap: 10px;
                margin-top: 5px;
            }
        }

        .action-btn {
            padding: 12px 30px;
            font-size: 1.1em;
            font-weight: bold;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            transition: all 0.3s ease;
            background: linear-gradient(135deg, #4ecdc4, #44a08d);
            color: #fff;
        }

        @media (max-width: 768px) {
            .action-btn {
                padding: 10px 20px;
                font-size: 1em;
            }
        }

        .action-btn:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(78, 205, 196, 0.4);
        }

        .action-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .deck-piles {
            display: flex;
            gap: 20px;
        }

        .pile {
            background: rgba(255, 255, 255, 0.1);
            padding: 10px 20px;
            border-radius: 8px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 5px;
        }

        .pile-icon {
            font-size: 2em;
        }

        .pile-label {
            font-size: 1.2em;
            font-weight: bold;
            color: #fff;
        }

        .game-over-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.8);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }

        .game-over-overlay.show {
            display: flex;
        }

        .map-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.9);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }

        .map-overlay.show {
            display: flex;
        }

        .map-content {
            background: linear-gradient(145deg, #1a1a2e, #16213e);
            padding: 30px 20px;
            border-radius: 20px;
            text-align: center;
            max-width: 900px;
            width: 90%;
            max-height: 80vh;
            overflow-y: auto;
        }

        @media (max-width: 768px) {
            .map-content {
                padding: 20px 10px;
                max-height: 70vh;
            }
        }

        .map-title {
            color: #ffd700;
            font-size: 2em;
            margin-bottom: 30px;
        }

        @media (max-width: 768px) {
            .map-title {
                font-size: 1.5em;
                margin-bottom: 20px;
            }
        }

        .map-nodes {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 20px;
            flex-wrap: wrap;
            margin-bottom: 30px;
        }

        .map-node {
            width: 80px;
            height: 80px;
            border-radius: 50%;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            cursor: pointer;
            transition: all 0.3s ease;
            border: 3px solid #4a5568;
            background: linear-gradient(145deg, #2d3748, #1a202c);
        }

        @media (max-width: 768px) {
            .map-node {
                width: 60px;
                height: 60px;
            }
        }

        @media (max-width: 480px) {
            .map-node {
                width: 50px;
                height: 50px;
            }
        }

        .map-node:hover:not(.completed):not(.locked) {
            transform: scale(1.1);
            box-shadow: 0 0 20px rgba(255, 215, 0, 0.5);
        }

        .map-node.completed {
            background: linear-gradient(145deg, #4ecdc4, #44a08d);
            border-color: #4ecdc4;
        }

        .map-node.current {
            animation: node-pulse 2s ease-in-out infinite;
        }

        @keyframes node-pulse {
            0%, 100% {
                box-shadow: 0 0 10px rgba(255, 215, 0, 0.5);
            }
            50% {
                box-shadow: 0 0 20px rgba(255, 215, 0, 0.8);
            }
        }

        .map-node.locked {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .map-node-icon {
            font-size: 2em;
        }

        @media (max-width: 768px) {
            .map-node-icon {
                font-size: 1.5em;
            }
        }

        @media (max-width: 480px) {
            .map-node-icon {
                font-size: 1.2em;
            }
        }

        .map-node-type {
            font-size: 0.6em;
            color: #aaa;
            margin-top: 5px;
        }

        @media (max-width: 768px) {
            .map-node-type {
                font-size: 0.5em;
            }
        }

        .upgrade-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.9);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }

        .upgrade-overlay.show {
            display: flex;
        }

        .upgrade-content {
            background: linear-gradient(145deg, #1a1a2e, #16213e);
            padding: 30px 20px;
            border-radius: 20px;
            text-align: center;
            max-width: 900px;
            width: 90%;
            max-height: 80vh;
            overflow-y: auto;
        }

        @media (max-width: 768px) {
            .upgrade-content {
                padding: 20px 10px;
                max-height: 70vh;
            }
        }

        .upgrade-title {
            color: #ffd700;
            font-size: 2em;
            margin-bottom: 30px;
        }

        @media (max-width: 768px) {
            .upgrade-title {
                font-size: 1.5em;
                margin-bottom: 20px;
            }
        }

        .upgrade-cards {
            display: flex;
            gap: 20px;
            justify-content: center;
            flex-wrap: wrap;
            margin-bottom: 30px;
        }

        .upgrade-option {
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .upgrade-option:hover {
            transform: scale(1.05);
        }

        .game-over-content {
            background: linear-gradient(145deg, #1a1a2e, #16213e);
            padding: 30px 20px;
            border-radius: 20px;
            text-align: center;
            max-width: 90%;
            margin: 0 auto;
        }

        @media (max-width: 768px) {
            .game-over-content {
                padding: 20px 15px;
            }
        }

        .game-over-title {
            color: #ffd700;
            font-size: 2.5em;
            margin-bottom: 20px;
        }

        @media (max-width: 768px) {
            .game-over-title {
                font-size: 1.8em;
                margin-bottom: 15px;
            }
        }

        .game-over-result {
            color: #fff;
            font-size: 1.5em;
            margin-bottom: 30px;
        }

        @media (max-width: 768px) {
            .game-over-result {
                font-size: 1.1em;
                margin-bottom: 20px;
            }
        }

        .restart-btn {
            background: linear-gradient(135deg, #4ecdc4, #44a08d);
            color: #fff;
            padding: 12px 30px;
            font-size: 1.2em;
            font-weight: bold;
            border: none;
            border-radius: 10px;
            cursor: pointer;
        }

        @media (max-width: 768px) {
            .restart-btn {
                padding: 10px 20px;
                font-size: 1em;
            }
        }

        .damage-number {
            position: absolute;
            font-size: 2em;
            font-weight: bold;
            color: #ff6b6b;
            animation: damage-float 1s ease-out forwards;
            pointer-events: none;
            z-index: 100;
        }

        .heal-number {
            color: #4ecdc4;
        }

        @keyframes damage-float {
            0% {
                opacity: 1;
                transform: translateY(0) scale(1);
            }
            50% {
                opacity: 1;
                transform: translateY(-30px) scale(1.3);
            }
            100% {
                opacity: 0;
                transform: translateY(-60px) scale(1.5);
            }
        }

        .status-effects {
            display: flex;
            gap: 5px;
            flex-wrap: wrap;
            margin-top: 5px;
        }

        .status-icon {
            background: rgba(0, 0, 0, 0.5);
            border-radius: 50%;
            width: 24px;
            height: 24px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.8em;
            cursor: help;
        }

        /* ===== 2D动画效果 ===== */
        /* 敌人动画容器 */
        .enemy-character {
            width: 120px;
            height: 120px;
            margin: 20px auto;
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .enemy-sprite {
            font-size: 80px;
            animation: enemy-idle 2s ease-in-out infinite;
            filter: drop-shadow(0 0 10px rgba(255, 107, 107, 0.5));
        }

        @media (max-width: 768px) {
            .enemy-character {
                width: 80px;
                height: 80px;
                margin: 10px auto;
            }

            .enemy-sprite {
                font-size: 60px;
            }
        }

        @keyframes enemy-idle {
            0%, 100% { transform: translateY(0) scale(1); }
            50% { transform: translateY(-5px) scale(1.02); }
        }

        .enemy-attacking {
            animation: enemy-attack 0.5s ease-out;
        }

        @keyframes enemy-attack {
            0% { transform: translateX(0); }
            50% { transform: translateX(50px) rotate(-5deg); }
            100% { transform: translateX(0); }
        }

        .enemy-hit {
            animation: enemy-hit 0.3s ease-out;
        }

        @keyframes enemy-hit {
            0% { transform: translateX(0); filter: brightness(1); }
            25% { transform: translateX(-20px); filter: brightness(2); }
            50% { transform: translateX(10px); filter: brightness(1.5); }
            100% { transform: translateX(0); filter: brightness(1); }
        }

        /* 玩家动画 */
        .player-character {
            width: 80px;
            height: 80px;
            margin: 10px auto;
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .player-sprite {
            font-size: 60px;
            animation: player-idle 2s ease-in-out infinite;
            filter: drop-shadow(0 0 10px rgba(78, 205, 196, 0.5));
        }

        @media (max-width: 768px) {
            .player-character {
                width: 60px;
                height: 60px;

        .card-playing {
            animation: card-play 0.4s ease-out forwards;
        }

            0% { transform: translateY(0) scale(1); opacity: 1; }
            50% { transform: translateY(-100px) scale(1.3) rotate(10deg); opacity: 1; }
            100% { transform: translateY(-200px) scale(0.5) rotate(20deg); opacity: 0; }
        }

        .attack-trail {
            position: absolute;
            width: 60px;
            height: 4px;
            background: linear-gradient(90deg, #ffd700, #ff6b6b);
            border-radius: 2px;
            pointer-events: none;
            z-index: 100;
            animation: trail-fade 0.3s ease-out forwards;
        }

        @keyframes trail-fade {
            0% { opacity: 1; transform: scaleX(0); }
            50% { opacity: 0.8; transform: scaleX(1); }
            100% { opacity: 0; transform: scaleX(1.2); }

            font-weight: bold;

            font-weight: bold;

            color: #ffd700;
            text-shadow: 0 0 10px rgba(255, 215, 0, 0.8), 2px 2px 0 rgba(0, 0, 0, 0.3);
        }

            animation: shake 0.5s ease-out;
        }

        @keyframes shake {

            20%, 40%, 60%, 80% { transform: translateX(5px); }
        }

        .flash-effect {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(255, 255, 255, 0.3);
            pointer-events: none;
            z-index: 999;
            animation: flash-fade 0.2s ease-out forwards;
        }

        @keyframes flash-fade {
            0% { opacity: 1; }
            100% { opacity: 0; }
        }

        /* 卡牌升级特效 */
        .card-upgrade-effect {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 200px;
            height: 200px;
            border-radius: 50%;
            background: radial-gradient(circle, rgba(255, 215, 0, 0.3), transparent);

            pointer-events: none;
            z-index: 1000;
        }

        @keyframes upgrade-glow {
            0% { transform: translate(-50%, -50%) scale(0); opacity: 1; }
            100% { transform: translate(-50%, -50%) scale(2); opacity: 0; }
        }

        /* 抽牌动画 */
        .card-draw {
            animation: card-draw-in 0.4s ease-out forwards;
        }

        @keyframes card-draw-in {
            0% {

            height: 10px;

            100% {

        // 音效系统
        const audioContext = new (window.AudioContext || window.webkitAudioContext)();

        function playSound(type) {
            const oscillator = audioContext.createOscillator();
            const gainNode = audioContext.createGain();

            oscillator.connect(gainNode);
            gainNode.connect(audioContext.destination);

            switch(type) {
                case 'card':
                    oscillator.frequency.value = 800;
                    oscillator.type = 'sine';
                    gainNode.gain.setValueAtTime(0.3, audioContext.currentTime);
                    gainNode.gain.exponentialRampToValueAtTime(0.01, audioContext.currentTime + 0.1);
                    oscillator.start(audioContext.currentTime);
                    oscillator.stop(audioContext.currentTime + 0.1);
                    break;
                case 'damage':
                    oscillator.frequency.value = 100;
                    oscillator.type = 'sawtooth';
                    gainNode.gain.setValueAtTime(0.3, audioContext.currentTime);
                    gainNode.gain.exponentialRampToValueAtTime(0.01, audioContext.currentTime + 0.3);
                    oscillator.start(audioContext.currentTime);
                    oscillator.stop(audioContext.currentTime + 0.3);
                    break;
            }
        }

        // 初始化游戏
        function initGame(nodeType = 'battle') {
            gameState.playerHealth = gameState.playerMaxHealth; // 保留当前生命值
            gameState.enemyHealth = gameState.enemyMaxHealth + (mapState.level - 1) * 10; // 敌人随关卡增强
            gameState.enemyMaxHealth = gameState.enemyHealth;
            gameState.energy = 3;
            gameState.playerHand = [];
            gameState.drawPile = [];
            gameState.discardPile = [];
            gameState.playerBlock = 0;
            gameState.enemyBlock = 0;
            gameState.playerStrength = 0;
            gameState.playerDexterity = 0;
            gameState.turn = 1;
            gameState.isPlayerTurn = true;
            gameState.cardsPlayedThisTurn = 0;
            gameState.damageTakenThisTurn = 0;
            gameState.endTurnEffects = [];

            gameState.playerStatus = { vulnerable: 0, weak: 0, poison: 0, regen: 0, ritual: 0, frail: 0, berserk: 0, buffer: 0, burn: 0, tempStrength: 0 };
            gameState.enemyStatus = { vulnerable: 0, weak: 0, poison: 0, regen: 0, ritual: 0, frail: 0, berserk: 0, buffer: 0, burn: 0 };

            createDrawPile();
            for (let i = 0; i < 5; i++) {
                drawCard();
            }
            setEnemyIntention();
            updateUI();
            addLog(`第 ${mapState.level} 层战斗开始！`, "player");
        }

        // 创建抽牌堆
        function createDrawPile() {
            // 使用玩家牌组而不是固定的起始牌
            if (gameState.playerDeck.length === 0) {
                // 初始牌组
                const starterCards = [
                    { baseName: '打击', level: 0, count: 4 },
                    { baseName: '防御', level: 0, count: 4 },
                    { baseName: '连斩', level: 0, count: 2 }
                ];

                starterCards.forEach(starter => {
                    const upgradeInfo = cardUpgrades[starter.baseName];
                    const baseCard = cardDatabase.find(c => c.id === upgradeInfo.baseId);

                    for (let i = 0; i < starter.count; i++) {
                        const level = starter.level;
                        const upgrade = upgradeInfo.upgrades[level];
                        gameState.playerDeck.push({
                            ...baseCard,
                            uid: Date.now() + Math.random() + i,
                            baseName: starter.baseName,
                            level: level,
                            damage: upgrade.damage || baseCard.damage,
                            block: upgrade.block || baseCard.block,
                            cost: upgrade.cost || baseCard.cost,
                            name: upgrade.name || baseCard.name,
                            retain: false,
                            exhaust: false
                        });
                    }
                });
            }

            gameState.drawPile = gameState.playerDeck.map(card => ({
                ...card,
                uid: Date.now() + Math.random()
            }));
            shuffleArray(gameState.drawPile);
        }

        // 洗牌
        function shuffleArray(array) {
            for (let i = array.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [array[i], array[j]] = [array[j], array[i]];
            }
        }

        // 抽卡
        function drawCard() {
            if (gameState.drawPile.length === 0) {
                if (gameState.discardPile.length === 0) return null;
                gameState.drawPile = [...gameState.discardPile];
                gameState.discardPile = [];
                shuffleArray(gameState.drawPile);
                addLog("洗牌！", "system");
            }
            const card = gameState.drawPile.pop();
            gameState.playerHand.push(card);
            return card;
        }

        // 更新UI
        function updateUI() {
            updateHealthBars();
            document.getElementById('player-block').textContent = gameState.playerBlock;
            document.getElementById('enemy-block').textContent = gameState.enemyBlock;
            document.getElementById('player-strength').textContent = gameState.playerStrength;
            document.getElementById('player-dexterity').textContent = gameState.playerDexterity;
            document.getElementById('energy-text').textContent = `${gameState.energy}/${gameState.maxEnergy}`;

            const playerHandEl = document.getElementById('player-hand');
            playerHandEl.innerHTML = '';
            gameState.playerHand.forEach(card => {
                const cardEl = createCardElement(card);
                if (card.cost > gameState.energy) {
                    cardEl.style.opacity = '0.5';
                    cardEl.style.cursor = 'not-allowed';
                }
                playerHandEl.appendChild(cardEl);
            });

            document.getElementById('draw-pile-count').textContent = gameState.drawPile.length;
            document.getElementById('discard-pile-count').textContent = gameState.discardPile.length;

            document.getElementById('points').textContent = gameState.points;
            document.getElementById('wins').textContent = gameState.wins;
            document.getElementById('total-games').textContent = gameState.totalGames;

            updateStatusEffects();
            document.getElementById('end-turn-btn').disabled = !gameState.isPlayerTurn;
        }

        // 更新生命值
        function updateHealthBars() {
            const playerPercent = (gameState.playerHealth / gameState.playerMaxHealth) * 100;
            const enemyPercent = (gameState.enemyHealth / gameState.enemyMaxHealth) * 100;

            document.getElementById('player-health-bar').style.width = playerPercent + '%';
            document.getElementById('enemy-health-bar').style.width = enemyPercent + '%';
            document.getElementById('player-health-text').textContent = `${gameState.playerHealth}/${gameState.playerMaxHealth}`;
            document.getElementById('enemy-health-text').textContent = `${gameState.enemyHealth}/${gameState.enemyMaxHealth}`;
        }

        // 设置敌人意图
        function setEnemyIntention() {
            const actions = [
                { type: 'attack', value: 8 + Math.floor(Math.random() * 5), icon: '⚔️', text: '攻击' },
                { type: 'defend', value: 6 + Math.floor(Math.random() * 5), icon: '🛡️', text: '防御' }
            ];
            const action = actions[Math.floor(Math.random() * actions.length)];
            gameState.enemyIntention = action;
            document.getElementById('intention-icon').textContent = action.icon;
            document.getElementById('intention-text').textContent = action.text === '攻击' ? `${action.text} ${action.value}` : `${action.text} ${action.value}`;
        }

        // 创建卡牌元素
        function createCardElement(card) {
            const cardEl = document.createElement('div');
            cardEl.className = 'card card-draw';
            cardEl.dataset.uid = card.uid;
            cardEl.dataset.rarity = card.rarity;
            cardEl.onclick = () => playCard(card);

            let upgradeBadge = '';
            if (card.level > 0) {
                upgradeBadge = `<div class="card-upgrade-badge">${card.level === 1 ? '+' : '++'}</div>`;
            }

            cardEl.innerHTML = `
                <div class="card-rarity ${card.rarity}"></div>
                <div class="card-cost">${card.cost}</div>
                <div class="card-image">${card.icon}</div>
                <div class="card-info">
                    <div class="card-name">${card.name}</div>
                    <div class="card-desc">${card.desc}</div>
                </div>
                ${upgradeBadge}
            `;
            return cardEl;
        }

        // 使用卡牌
        function playCard(card) {
            if (!gameState.isPlayerTurn) return;
            if (card.cost > gameState.energy) {
                addLog("能量不足！", "player");
                return;
            }

            gameState.energy -= card.cost;
            playSound('card');
            gameState.cardsPlayedThisTurn++;

            // 玩家攻击动画
            animatePlayerAttack();

            const index = gameState.playerHand.findIndex(c => c.uid === card.uid);
            if (index > -1) {
                gameState.playerHand.splice(index, 1);

                // 检查是否是消耗牌
                if (card.effect && card.effect.includes('exhaust')) {
                    addLog(`${card.name} 被消耗了！`, "system");
                } else if (card.retain) {
                    // 保留牌
                    card.retain = false;
                    gameState.playerHand.push(card);
                } else {
                    gameState.discardPile.push(card);
                }
            }

            executeCardEffect(card);
            updateUI();
            checkGameOver();
        }

        // 执行卡牌效果
        function executeCardEffect(card) {
            addLog(`使用了 ${card.name}！`, "player");

            let damage = card.damage + gameState.playerStrength + (gameState.playerStatus.tempStrength || 0);

            // 连击判断
            if (card.effect && card.effect.includes('combo')) {
                if (gameState.cardsPlayedThisTurn > 1) {
                    damage += 6; // 额外伤害
                    addLog(`连击触发！额外造成6点伤害！`, "player");
                }
            }

            // 终结技判断
            if (card.effect && card.effect.includes('finisher')) {
                if (gameState.cardsPlayedThisTurn >= 3) {
                    damage += 12; // 额外伤害
                    addLog(`终结技触发！额外造成12点伤害！`, "player");
                }
            }

            // 反击判断
            if (card.effect && card.effect.includes('counter')) {
                if (gameState.damageTakenThisTurn > 0) {
                    damage *= 2;
                    addLog(`反击触发！伤害翻倍！`, "player");
                }
            }

            // 连锁反应
            if (card.effect && card.effect.includes('multiAttack:4')) {
                damage += gameState.cardsPlayedThisTurn * 2;
                addLog(`连锁反应！额外造成 ${gameState.cardsPlayedThisTurn * 2} 点伤害！`, "player");
            }

            if (gameState.enemyStatus.weak > 0) {
                damage = Math.floor(damage * 0.75);
            }

            if (card.block > 0) {
                gameState.playerBlock += card.block + gameState.playerDexterity;
                addLog(`获得 ${card.block + gameState.playerDexterity} 点护盾！`, "player");
                showShieldGain(card.block + gameState.playerDexterity);
            }

            if (damage > 0) {
                let actualDamage = damage;

                // 易伤加成
                if (gameState.enemyStatus.vulnerable > 0) {
                    actualDamage = Math.floor(actualDamage * 1.5);
                }

                if (gameState.enemyBlock > 0) {
                    const blocked = Math.min(gameState.enemyBlock, actualDamage);
                    gameState.enemyBlock -= blocked;
                    actualDamage -= blocked;
                    showBlockGain(blocked);
                }

                if (actualDamage > 0) {
                    gameState.enemyHealth -= actualDamage;
                    addLog(`${card.name} 造成 ${actualDamage} 点伤害！`, "player");
                    showDamageNumber(actualDamage, document.getElementById('enemy-health-bar'));
                    animateEnemyHit();
                    createDamageParticles(document.getElementById('enemy-character'));
                    playSound('damage');

                    if (damage >= 20 && !gameState.achievements.combo.unlocked) {
                        gameState.achievements.combo.unlocked = true;
                        addLog(`🏆 解锁成就：${gameState.achievements.combo.name}`, "player");
                    }
                }
            }

            // 吸血效果
            if (damage > 0 && card.effect && card.effect.includes('lifesteal')) {
                let actualDamage = Math.min(damage, gameState.enemyHealth + (gameState.enemyBlock > 0 ? gameState.enemyBlock : 0));
                gameState.playerHealth = Math.min(gameState.playerMaxHealth, gameState.playerHealth + actualDamage);
                showHealNumber(actualDamage, document.getElementById('player-health-bar'));
                addLog(`吸血恢复 ${actualDamage} 点生命！`, "player");
            }

            if (card.effect) {
                parseCardEffects(card.effect);
            }
        }

        // 解析卡牌效果
        function parseCardEffects(effectStr) {
            const effects = effectStr.split(';');
            effects.forEach(effect => {
                const [type, value] = effect.split(':');

                switch(type) {
                    case 'multiAttack':
                        const count = parseInt(value);
                        for (let i = 0; i < count - 1; i++) {
                            setTimeout(() => {
                                let dmg = 3 + gameState.playerStrength + (gameState.playerStatus.tempStrength || 0);
                                let actual = dmg;
                                if (gameState.enemyStatus.vulnerable > 0) {
                                    actual = Math.floor(actual * 1.5);
                                }
                                if (gameState.enemyBlock > 0) {
                                    const blocked = Math.min(gameState.enemyBlock, actual);
                                    gameState.enemyBlock -= blocked;
                                    actual -= blocked;
                                }
                                if (actual > 0) {
                                    gameState.enemyHealth -= actual;
                                    showDamageNumber(actual, document.getElementById('enemy-health-bar'));
                                    playSound('damage');
                                }
                            }, i * 300);
                        }
                        break;
                    case 'strength':
                        gameState.playerStrength += parseInt(value);
                        addLog(`获得 ${value} 点力量！`, "player");
                        break;
                    case 'dex':
                        gameState.playerDexterity += parseInt(value);
                        addLog(`获得 ${value} 点敏捷！`, "player");
                        break;
                    case 'weak':
                        gameState.enemyStatus.weak += parseInt(value);
                        addLog(`敌人虚弱 ${value} 回合！`, "player");
                        break;
                    case 'vulnerable':
                        gameState.enemyStatus.vulnerable += parseInt(value);
                        addLog(`敌人易伤 ${value} 回合！`, "player");
                        break;
                    case 'poison':
                        gameState.enemyStatus.poison += parseInt(value);
                        addLog(`敌人中毒 ${value} 层！`, "player");
                        break;
                    case 'regen':
                        gameState.playerStatus.regen += parseInt(value);
                        addLog(`再生 ${value} 回合！`, "player");
                        break;
                    case 'heal':
                        const heal = parseInt(value);
                        gameState.playerHealth = Math.min(gameState.playerMaxHealth, gameState.playerHealth + heal);
                        showHealNumber(heal, document.getElementById('player-health-bar'));
                        addLog(`恢复 ${heal} 点生命！`, "player");
                        break;
                    case 'lifesteal':
                        break;
                    case 'cleanse':
                        Object.keys(gameState.playerStatus).forEach(key => {
                            if (key !== 'regen') {
                                gameState.playerStatus[key] = 0;
                            }
                        });
                        addLog(`清除所有负面状态！`, "player");
                        break;
                    case 'divine':
                        gameState.playerStatus.buffer += 1;
                        addLog(`获得神圣护盾！`, "player");
                        break;
                    case 'draw':
                        for (let i = 0; i < parseInt(value); i++) {
                            drawCard();
                        }
                        addLog(`抽了 ${value} 张牌！`, "player");
                        break;
                    case 'energy':
                        gameState.energy += parseInt(value);
                        showEnergyGain(parseInt(value));
                        addLog(`获得 ${value} 能量！`, "player");
                        break;
                    case 'block':
                        gameState.playerBlock += parseInt(value) + gameState.playerDexterity;
                        addLog(`获得 ${parseInt(value) + gameState.playerDexterity} 点护盾！`, "player");
                        break;
                    case 'selfDamage':
                        const selfDmg = parseInt(value);
                        gameState.playerHealth -= selfDmg;
                        gameState.damageTakenThisTurn += selfDmg;
                        showDamageNumber(selfDmg, document.getElementById('player-health-bar'));
                        addLog(`受到 ${selfDmg} 点伤害！`, "enemy");
                        break;
                    case 'berserk':
                        gameState.playerStatus.berserk += parseInt(value);
                        addLog(`狂暴 ${value} 回合！`, "player");
                        break;
                    case 'exhaust':
                        break;
                    case 'retain':
                        // 查找当前卡牌并设置retain标志
                        const retainCard = gameState.playerHand.find(c => c.effect && c.effect.includes('retain'));
                        if (retainCard) {
                            retainCard.retain = true;
                        }
                        break;
                    case 'ritual':
                        gameState.playerStatus.ritual += parseInt(value) || 3;
                        addLog(`仪式效果激活！`, "player");
                        break;
                    case 'burn':
                        gameState.playerStatus.burn += parseInt(value) || 4;
                        addLog(`受到灼烧！`, "enemy");
                        break;
                    case 'endTurn':
                        gameState.endTurnEffects.push({ type: value });
                        addLog(`回合结束触发效果！`, "player");
                        break;
                    case 'combo':
                    case 'finisher':
                    case 'counter':
                        // 这些效果在 executeCardEffect 中处理
                        break;
                }
            });
        }

        // 结束回合
        function endTurn() {
            if (!gameState.isPlayerTurn) return;

            gameState.isPlayerTurn = false;
            addLog("结束回合...", "player");

            // 将手牌中的非保留牌弃掉
            const cardsToDiscard = [];
            gameState.playerHand = gameState.playerHand.filter(card => {
                if (!card.retain) {
                    cardsToDiscard.push(card);
                    return false;
                }
                return true;
            });
            cardsToDiscard.forEach(card => gameState.discardPile.push(card));

            updateUI();

            setTimeout(() => {
                aiTurn();
            }, 1000);
        }

        // AI回合
        function aiTurn() {
            addLog("AI 的回合...", "enemy");

            // 处理敌人意图
            const intention = gameState.enemyIntention;
            if (intention.type === 'attack') {
                let damage = intention.value + gameState.enemyStrength;
                if (gameState.enemyStatus.weak > 0) {
                    damage = Math.floor(damage * 0.75);
                }

                let actualDamage = damage;
                if (gameState.playerStatus.vulnerable > 0) {
                    actualDamage = Math.floor(actualDamage * 1.5);
                }

                // 敌人攻击动画
                animateEnemyAttack();

                if (gameState.playerBlock > 0) {
                    const blocked = Math.min(gameState.playerBlock, actualDamage);
                    gameState.playerBlock -= blocked;
                    actualDamage -= blocked;
                    showBlockGain(blocked);
                }

                if (actualDamage > 0) {
                    // 检查神圣护盾
                    if (gameState.playerStatus.buffer > 0) {
                        actualDamage = 0;
                        gameState.playerStatus.buffer--;
                        addLog(`神圣护盾抵挡了伤害！`, "player");
                    }

                    gameState.playerHealth -= actualDamage;
                    gameState.damageTakenThisTurn += actualDamage;
                    addLog(`AI 攻击造成 ${actualDamage} 点伤害！`, "enemy");
                    showDamageNumber(actualDamage, document.getElementById('player-health-bar'));
                    animatePlayerHit();
                    createDamageParticles(document.getElementById('player-character'));
                    triggerScreenShake();
                    playSound('damage');
                }
            } else if (intention.type === 'defend') {
                gameState.enemyBlock += intention.value;
                addLog(`AI 获得 ${intention.value} 点护盾！`, "enemy");
                showShieldGain(intention.value);
            }

            // 处理状态效果
            if (gameState.enemyStatus.poison > 0) {
                const poisonDamage = gameState.enemyStatus.poison * 2;
                gameState.enemyHealth -= poisonDamage;
                addLog(`毒素造成 ${poisonDamage} 点伤害！`, "system");
            }

            checkGameOver();

            setTimeout(() => {
                startPlayerTurn();
            }, 1500);
        }

        // 开始玩家回合
        function startPlayerTurn() {
            gameState.turn++;
            gameState.isPlayerTurn = true;
            gameState.energy = gameState.maxEnergy;
            gameState.cardsPlayedThisTurn = 0;
            gameState.damageTakenThisTurn = 0;

            // 处理状态效果
            if (gameState.playerStatus.regen > 0) {
                const heal = 4;
                gameState.playerHealth = Math.min(gameState.playerMaxHealth, gameState.playerHealth + heal);
                addLog(`再生恢复 ${heal} 点生命！`, "player");
                gameState.playerStatus.regen--;
            }

            if (gameState.playerStatus.poison > 0) {
                const poisonDamage = gameState.playerStatus.poison * 2;
                gameState.playerHealth -= poisonDamage;
                addLog(`毒素造成 ${poisonDamage} 点伤害！`, "system");
                gameState.playerStatus.poison--;
            }

            // 狂暴效果
            if (gameState.playerStatus.berserk > 0) {
                const damage = 1;
                gameState.playerHealth -= damage;
                addLog(`狂暴造成 ${damage} 点伤害！`, "system");
                gameState.playerStatus.berserk--;
            }

            // 灼烧效果
            if (gameState.playerStatus.burn > 0) {
                gameState.playerHealth -= gameState.playerStatus.burn;
                addLog(`灼烧造成 ${gameState.playerStatus.burn} 点伤害！`, "system");
            }

            // 仪式效果
            if (gameState.playerStatus.ritual > 0) {
                gameState.playerStrength += 2;
                addLog(`仪式获得2点力量！`, "player");
                gameState.playerStatus.ritual--;
            }

            // 执行回合结束效果
            if (gameState.endTurnEffects.length > 0) {
                gameState.endTurnEffects.forEach(effect => {
                    if (effect.type === 'draw:3') {
                        for (let i = 0; i < 3; i++) {
                            drawCard();
                        }
                        addLog(`回合结束抽了3张牌！`, "player");
                    } else if (effect.type === 'strength:2') {
                        gameState.playerStrength += 2;
                        addLog(`回合结束获得2点力量！`, "player");
                    }
                });
                gameState.endTurnEffects = [];
            }

            if (gameState.enemyStatus.weak > 0) gameState.enemyStatus.weak--;
            if (gameState.enemyStatus.vulnerable > 0) gameState.enemyStatus.vulnerable--;

            // 处理保留牌
            gameState.playerHand.forEach(card => {
                if (card.retain) {
                    card.retain = false;
                }
            });

            // 抽牌
            drawCard();
            drawCard();

            // 抽新卡牌
            if (Math.random() < 0.3 && gameState.playerHand.length < 10) {
                const rareCards = cardDatabase.filter(c => c.rarity === 'rare' || c.rarity === 'epic' || c.rarity === 'legendary');
                const newCard = rareCards[Math.floor(Math.random() * rareCards.length)];
                if (newCard) {
                    gameState.drawPile.push({ ...newCard, uid: Date.now() + Math.random(), retain: false, exhaust: false });
                    addLog(`获得新卡牌：${newCard.name}！`, "player");
                }
            }

            // 清空护盾
            gameState.playerBlock = 0;
            gameState.enemyBlock = 0;

            // 设置新意图
            setEnemyIntention();

            addLog(`第 ${gameState.turn} 回合，你的回合`, "player");
            updateUI();
        }

        // 显示伤害数字
        function showDamageNumber(damage, target) {
            const rect = target.getBoundingClientRect();
            const damageEl = document.createElement('div');
            damageEl.className = 'damage-number';
            damageEl.textContent = `-${damage}`;
            damageEl.style.left = rect.left + rect.width / 2 - 20 + 'px';
            damageEl.style.top = rect.top + 'px';
            document.body.appendChild(damageEl);
            setTimeout(() => damageEl.remove(), 1000);
        }

        // 显示治疗数字
        function showHealNumber(heal, target) {
            const rect = target.getBoundingClientRect();
            const healEl = document.createElement('div');
            healEl.className = 'damage-number heal-number';
            healEl.textContent = `+${heal}`;
            healEl.style.left = rect.left + rect.width / 2 - 20 + 'px';
            healEl.style.top = rect.top + 'px';
            document.body.appendChild(healEl);
            setTimeout(() => healEl.remove(), 1000);
        }

        // 更新状态效果显示
        function updateStatusEffects() {
            // 简化的状态效果显示
        }

        // 检查游戏结束
        function checkGameOver() {
            if (gameState.playerHealth <= 0) {
                gameState.playerHealth = 0;
                endGame(false);
            } else if (gameState.enemyHealth <= 0) {
                gameState.enemyHealth = 0;
                endGame(true);
            }
        }

        // 结束游戏
        function endGame(playerWon) {
            gameState.totalGames++;

            if (playerWon) {
                gameState.wins++;
                gameState.points += 10;

                checkAchievements();

                // 标记当前节点为已完成
                if (mapState.nodes[mapState.currentNode]) {
                    mapState.nodes[mapState.currentNode].completed = true;
                }

                document.getElementById('game-over-title').textContent = "🎉 胜利！";
                document.getElementById('game-over-result').textContent = "你赢得了战斗！获得 10 积分！";
            } else {
                document.getElementById('game-over-title').textContent = "💀 失败";
                document.getElementById('game-over-result').textContent = "你被击败了！";
                // 失败重置游戏
                mapState.currentNode = 0;
                mapState.level = 1;
                mapState.nodes = [];
                gameState.playerDeck = [];
                gameState.playerMaxHealth = 50;
            }

            document.getElementById('game-over-overlay').classList.add('show');
            updateUI();
        }

        // 检查成就
        function checkAchievements() {
            if (!gameState.achievements.firstWin.unlocked && gameState.wins >= 1) {
                gameState.achievements.firstWin.unlocked = true;
                addLog(`🏆 解锁成就：${gameState.achievements.firstWin.name}`, "player");
            }
            if (!gameState.achievements.warrior.unlocked && gameState.wins >= 5) {
                gameState.achievements.warrior.unlocked = true;
                addLog(`🏆 解锁成就：${gameState.achievements.warrior.name}`, "player");
            }
            if (!gameState.achievements.champion.unlocked && gameState.wins >= 10) {
                gameState.achievements.champion.unlocked = true;
                addLog(`🏆 解锁成就：${gameState.achievements.champion.name}`, "player");
            }
            if (!gameState.achievements.survivor.unlocked && gameState.playerHealth === 1 && gameState.wins >= 1) {
                gameState.achievements.survivor.unlocked = true;
                addLog(`🏆 解锁成就：${gameState.achievements.survivor.name}`, "player");
            }
            if (!gameState.achievements.collector.unlocked && gameState.points >= 100) {
                gameState.achievements.collector.unlocked = true;
                addLog(`🏆 解锁成就：${gameState.achievements.collector.name}`, "player");
            }

            updateAchievementsList();
        }

        // 更新成就列表
        function updateAchievementsList() {
            const listEl = document.getElementById('achievement-list');
            listEl.innerHTML = '';

            Object.values(gameState.achievements).forEach(achievement => {
                const achievementEl = document.createElement('div');
                achievementEl.className = 'achievement' + (achievement.unlocked ? '' : ' locked');
                achievementEl.innerHTML = `
                    <div class="achievement-icon">${achievement.icon}</div>
                    <div class="achievement-info">
                        <div class="achievement-name">${achievement.name}</div>
                        <div class="achievement-desc">${achievement.desc}</div>
                    </div>
                `;
                listEl.appendChild(achievementEl);
            });
        }

        // 添加日志
        function addLog(message, type = "") {
            const logEntries = document.getElementById('log-entries');
            const logEntry = document.createElement('div');
            logEntry.className = 'log-entry ' + type;
            logEntry.textContent = message;
            logEntries.appendChild(logEntry);
            logEntries.scrollTop = logEntries.scrollHeight;
        }

        // 重新开始游戏
        function restartGame() {
            document.getElementById('game-over-overlay').classList.remove('show');
            document.getElementById('log-entries').innerHTML = '';
            initGame();
        }

        // ===== 地图系统 =====
        function generateMap() {
            mapState.nodes = [];
            const nodeTypes = ['battle', 'battle', 'battle', 'upgrade', 'rest'];
            const nodesPerLevel = 3;

            for (let level = 0; level < mapState.maxLevels; level++) {
                for (let i = 0; i < nodesPerLevel; i++) {
                    const type = nodeTypes[Math.floor(Math.random() * nodeTypes.length)];
                    mapState.nodes.push({
                        level: level,
                        type: type,
                        completed: false,
                        id: mapState.nodes.length
                    });
                }
            }
        }

        function showMap() {
            document.getElementById('game-over-overlay').classList.remove('show');
            generateMap();
            renderMap();
            document.getElementById('map-overlay').classList.add('show');
        }

        function closeMap() {
            document.getElementById('map-overlay').classList.remove('show');
        }

        function renderMap() {
            const container = document.getElementById('map-nodes');
            container.innerHTML = '';

            const icons = {
                'battle': '⚔️',
                'upgrade': '⬆️',
                'rest': '💤'
            };

            const labels = {
                'battle': '战斗',
                'upgrade': '升级',
                'rest': '休息'
            };

            mapState.nodes.forEach((node, index) => {
                const nodeEl = document.createElement('div');
                nodeEl.className = `map-node ${node.completed ? 'completed' : ''} ${index === mapState.currentNode ? 'current' : ''} ${index > mapState.currentNode + 1 ? 'locked' : ''}`;
                nodeEl.innerHTML = `
                    <div class="map-node-icon">${icons[node.type]}</div>
                    <div class="map-node-type">${labels[node.type]}</div>
                `;

                if (!node.completed && index <= mapState.currentNode + 1 && index !== mapState.currentNode) {
                    nodeEl.onclick = () => selectNode(index);
                }

                container.appendChild(nodeEl);
            });
        }

        function selectNode(index) {
            mapState.currentNode = index;
            const node = mapState.nodes[index];
            closeMap();

            if (node.type === 'battle') {
                mapState.level = node.level + 1;
                initGame('battle');
            } else if (node.type === 'upgrade') {
                showUpgradeScreen();
            } else if (node.type === 'rest') {
                restAtCamp();
            }
        }

        // ===== 升级系统 =====
        function showUpgradeScreen() {
            // 找出可升级的卡牌
            const upgradeableCards = [];
            gameState.playerDeck.forEach((card, index) => {
                const upgradeInfo = cardUpgrades[card.baseName];
                if (upgradeInfo && card.level < 2) {
                    const nextLevel = card.level + 1;
                    const nextUpgrade = upgradeInfo.upgrades[nextLevel];
                    upgradeableCards.push({
                        cardIndex: index,
                        baseName: card.baseName,
                        currentLevel: card.level,
                        nextLevel: nextLevel,
                        nextDamage: nextUpgrade.damage || card.damage,
                        nextBlock: nextUpgrade.block || card.block,
                        nextCost: nextUpgrade.cost || card.cost,
                        nextName: nextUpgrade.name
                    });
                }
            });

            // 显示最多3个升级选项
            const container = document.getElementById('upgrade-cards');
            container.innerHTML = '';

            const options = upgradeableCards.slice(0, 3);
            options.forEach(option => {
                const cardEl = createUpgradeCardElement(option);
                container.appendChild(cardEl);
            });

            document.getElementById('upgrade-overlay').classList.add('show');
        }

        function createUpgradeCardElement(option) {
            const upgradeInfo = cardUpgrades[option.baseName];
            const baseCard = cardDatabase.find(c => c.id === upgradeInfo.baseId);

            const cardEl = document.createElement('div');
            cardEl.className = 'card upgrade-option';
            cardEl.style.border = '2px solid #ffd700';
            cardEl.onclick = () => upgradeCard(option);

            cardEl.innerHTML = `
                <div class="card-rarity legendary"></div>
                <div class="card-cost">${option.nextCost}</div>
                <div class="card-image">${baseCard.icon}</div>
                <div class="card-info">
                    <div class="card-name">${option.nextName}</div>
                    <div class="card-desc">伤害: ${option.nextDamage} | 护盾: ${option.nextBlock || 0}</div>
                </div>
            `;

            return cardEl;
        }

        function upgradeCard(option) {
            const card = gameState.playerDeck[option.cardIndex];
            card.level = option.nextLevel;
            card.damage = option.nextDamage;
            card.block = option.nextBlock || 0;
            card.cost = option.nextCost;
            card.name = option.nextName;

            addLog(`${card.name} 升级成功！`, "player");
            createFlashEffect();
            skipUpgrade();
        }

        function skipUpgrade() {
            document.getElementById('upgrade-overlay').classList.remove('show');
            // 继续游戏
            showMap();
        }

        // ===== 休息系统 =====
        function restAtCamp() {
            const healAmount = Math.floor(gameState.playerMaxHealth * 0.3);
            gameState.playerHealth = Math.min(gameState.playerMaxHealth, gameState.playerHealth + healAmount);
            gameState.playerMaxHealth += 5; // 永久增加最大生命值
            addLog(`在营地休息，恢复 ${healAmount} 点生命！最大生命值+5`, "player");

            // 标记当前节点为已完成
            if (mapState.nodes[mapState.currentNode]) {
                mapState.nodes[mapState.currentNode].completed = true;
            }

            showMap();
        }

        // ===== 动画效果函数 =====
        function animatePlayerAttack() {
            const sprite = document.getElementById('player-sprite');
            if (sprite) {
                sprite.classList.remove('player-attacking');
                void sprite.offsetWidth; // 触发重绘
                sprite.classList.add('player-attacking');
            }
        }

        function animateEnemyAttack() {
            const sprite = document.getElementById('enemy-sprite');
            if (sprite) {
                sprite.classList.remove('enemy-attacking');
                void sprite.offsetWidth;
                sprite.classList.add('enemy-attacking');
            }
        }

        function animateEnemyHit() {
            const sprite = document.getElementById('enemy-sprite');
            if (sprite) {
                sprite.classList.remove('enemy-hit');
                void sprite.offsetWidth;
                sprite.classList.add('enemy-hit');
            }
        }

        function animatePlayerHit() {
            const sprite = document.getElementById('player-sprite');
            if (sprite) {
                sprite.classList.remove('player-hit');
                void sprite.offsetWidth;
                sprite.classList.add('player-hit');
            }
        }

        function triggerScreenShake() {
            document.body.classList.add('screen-shake');
            setTimeout(() => {
                document.body.classList.remove('screen-shake');
            }, 500);
        }

        function createFlashEffect() {
            const flash = document.createElement('div');
            flash.className = 'flash-effect';
            document.body.appendChild(flash);
            setTimeout(() => flash.remove(), 200);
        }

        function showShieldGain(amount) {
            const blockEl = document.getElementById('player-block');
            if (blockEl) {
                blockEl.classList.remove('shield-display-update');
                void blockEl.offsetWidth;
                blockEl.classList.add('shield-display-update');
            }

            const shieldPopup = document.createElement('div');
            shieldPopup.className = 'shield-gain';
            shieldPopup.textContent = `+${amount}`;
            shieldPopup.style.left = '200px';
            shieldPopup.style.top = '300px';
            document.body.appendChild(shieldPopup);
            setTimeout(() => shieldPopup.remove(), 1000);
        }

        function showBlockGain(amount) {
            const blockEl = document.getElementById('enemy-block');
            if (blockEl) {
                blockEl.classList.remove('shield-display-update');
                void blockEl.offsetWidth;
                blockEl.classList.add('shield-display-update');
            }
        }

        function createDamageParticles(target) {
            const rect = target.getBoundingClientRect();
            for (let i = 0; i < 8; i++) {
                const particle = document.createElement('div');
                particle.className = 'damage-particle';
                particle.style.left = rect.left + rect.width / 2 + 'px';
                particle.style.top = rect.top + rect.height / 2 + 'px';

                const angle = (i / 8) * Math.PI * 2;
                const distance = 30 + Math.random() * 30;
                particle.style.setProperty('--tx', `${Math.cos(angle) * distance}px`);
                particle.style.setProperty('--ty', `${Math.sin(angle) * distance}px`);

                document.body.appendChild(particle);
                setTimeout(() => particle.remove(), 600);
            }
        }

        function showStatusPopup(icon, text, target) {
            const popup = document.createElement('div');
            popup.className = 'status-popup';
            popup.innerHTML = `${icon} ${text}`;
            popup.style.left = '50%';
            popup.style.top = '40%';
            popup.style.color = '#ffd700';
            document.body.appendChild(popup);
            setTimeout(() => popup.remove(), 1500);
        }

        function showEnergyGain(amount) {
            const popup = document.createElement('div');
            popup.className = 'energy-gain';
            popup.textContent = `+${amount}⚡`;
            popup.style.left = '400px';
            popup.style.top = '350px';
            document.body.appendChild(popup);
            setTimeout(() => popup.remove(), 1000);
        }

        function animateCardUpgrade(element) {
            const effect = document.createElement('div');
            effect.className = 'card-upgrade-effect';
            element.style.position = 'relative';
            element.appendChild(effect);
            setTimeout(() => effect.remove(), 1000);
        }

        // 页面加载后初始化
        window.onload = function() {
            initGame();
            updateAchievementsList();
        };
    </script>
</body>
</html>
