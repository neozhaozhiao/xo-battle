<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>按钮测试</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background: #1e1e3f;
            color: white;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
        }
        #mainMenu {
            text-align: center;
        }
        h1 {
            color: #4ecdc4;
            margin-bottom: 20px;
        }
        button {
            padding: 20px 60px;
            font-size: 24px;
            background: #4ecdc4;
            border: none;
            border-radius: 10px;
            color: white;
            cursor: pointer;
            margin: 10px;
        }
        button:hover {
            background: #44a08d;
        }
    </style>
</head>
<body>
    <div id="mainMenu">
        <h1>🏰 XO大作战</h1>
        <button onclick="testAndStartGame()">🎮 开始游戏</button>
        <p id="message"></p>
    </div>

    <script>
        function testAndStartGame() {
            document.getElementById('message').textContent = '✅ 按钮点击成功！';
            alert('✅ 按钮点击成功！');
            console.log('按钮被点击了');
        }
    </script>
</body>
</html>
